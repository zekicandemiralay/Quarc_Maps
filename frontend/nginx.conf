worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# Single external port — stream module routes HTTP vs HTTPS to separate servers
stream {
    map $ssl_preread_protocol $route_addr {
        ""      127.0.0.1:8080;   # plain HTTP → cert download
        default 127.0.0.1:8443;   # TLS → HTTPS app
    }

    server {
        listen 7300;
        ssl_preread on;
        proxy_pass $route_addr;
    }
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # HTTP — cert download (no TLS required, so phones can get the cert before trusting it)
    server {
        listen 8080;
        server_name _;

        location = /cert {
            default_type application/x-x509-ca-cert;
            add_header Content-Disposition 'attachment; filename="cert.crt"';
            alias /etc/nginx/ssl/cert.pem;
        }

        location / {
            return 301 https://$http_host$request_uri;
        }
    }

    # HTTPS — main app
    server {
        listen 8443 ssl;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location /api/ {
            proxy_pass         http://backend:3001/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            client_max_body_size 0;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
